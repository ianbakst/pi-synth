[audio]
# Matched case-insensitively against /proc/asound/cards. Default is hifiberry.
card          = "hifiberry"
# device      = "hw:2"  # set explicitly to bypass card resolution
period_size   = 128
periods       = 2
sample_rate   = 48000
default_gain  = 2.0
max_gain      = 5.0
cores         = "2,3"
rt_priority   = 80

[display]
width        = 800
height       = 480
framebuffer  = "/dev/fb0"
touch_device = "/dev/input/event4"
